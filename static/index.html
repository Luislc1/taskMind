<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMind</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo">TaskMind</h1>
            <nav class="menu">
                <button class="menu-item active" data-target="dashboard">Dashboard</button>
                <button class="menu-item" data-target="tasks">Tasks</button>
                <button class="menu-item" data-target="assistant">Assistant</button>
                <button class="menu-item" data-target="reports">Reports</button>
            </nav>
        </aside>

        <main class="content">
            <!-- Dashboard View -->
            <section id="dashboard" class="view active">
                <header>
                    <h2>Overview</h2>
                </header>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value" id="stat-completed">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">In Progress</span>
                        <span class="stat-value" id="stat-doing">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value" id="stat-pending">0</span>
                    </div>
                </div>
            </section>

            <!-- Tasks View -->
            <section id="tasks" class="view">
                <header class="tasks-header">
                    <h2>Tasks</h2>
                    <button class="btn primary" id="btn-new-task">New Task</button>
                </header>
                <div class="task-list" id="task-list">
                    <!-- Tasks injected via JS -->
                </div>
            </section>

            <!-- Assistant View -->
            <section id="assistant" class="view">
                <header>
                    <h2>Assistant</h2>
                </header>
                <div class="chat-container">
                    <div class="chat-history" id="chat-history"></div>
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="Type a message...">
                        <button class="btn primary" id="btn-send">Send</button>
                    </div>
                </div>
            </section>

            <!-- Reports View -->
            <section id="reports" class="view">
                <header class="tasks-header">
                    <h2>Productivity Reports</h2>
                    <button class="btn primary" id="btn-generate-report">Generate Report</button>
                </header>
                <div class="reports-list" id="reports-list">
                </div>
            </section>
        </main>
    </div>

    <!-- Modal New Task -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <h3 class="modal-title">Create Task</h3>
            <input type="text" id="task-title" class="input-field" placeholder="Task title">
            <textarea id="task-desc" class="input-field" placeholder="Description"></textarea>
            <div class="form-row">
                <select id="task-priority" class="input-field">
                    <option value="baixa">Low</option>
                    <option value="média" selected>Medium</option>
                    <option value="alta">High</option>
                    <option value="urgente">Urgent</option>
                </select>
                <input type="date" id="task-due" class="input-field">
            </div>
            <div class="modal-actions">
                <button class="btn secondary" id="btn-cancel-task">Cancel</button>
                <button class="btn primary" id="btn-save-task">Save</button>
            </div>
        </div>
    </div>
    
    <!-- Modal Loader -->
    <div class="modal" id="loader-modal">
        <div class="modal-content loader-content">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
